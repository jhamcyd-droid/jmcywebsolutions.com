<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JMCY Dispatch & Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a365d; --secondary: #2c5282; --border: #e2e8f0; --accent: #2f855a; --danger: #e53e3e; --warning: #d69e2e; }
        body { font-family: sans-serif; background: #edf2f7; padding: 10px; }
        .fixed-mobile-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .card-title { font-size: 18px; color: var(--primary); margin-bottom: 10px; border-bottom: 2px solid var(--border); padding-bottom: 8px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
        .user-banner { background: var(--primary); color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9rem; text-align: center; display: flex; justify-content: space-between; align-items: center; }
        .btn-logout { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .tab-nav { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #cbd5e0; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .scroll-wrapper { width: 100%; overflow-x: auto; max-height: 450px; overflow-y: auto; border: 1px solid var(--border); }
        .ledger-table { width: 100%; min-width: 1400px; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
        .ledger-table th, .ledger-table td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
        .ledger-table th { background: #f7fafc; color: var(--primary); text-transform: uppercase; position: sticky; top: 0; z-index: 10; }
        
        .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding: 5px; }
        .btn-nav, .btn-refresh { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; background: var(--secondary); color: white; font-weight: bold; }
        .btn-nav:disabled { background: #cbd5e0; cursor: not-allowed; }
        
        .btn-accept, .btn-view, .btn-payment { padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 12px; }
        .btn-accept { background: var(--accent); }
        .btn-view { background: var(--secondary); }
        .btn-payment { background: var(--warning); }
        .copy-hint { cursor: pointer; border-bottom: 1px dashed #cbd5e0; }
        .float-support { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px; border-radius: 50px; font-weight: bold; text-decoration: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2); font-size: 14px; z-index: 1000; }
        .date-emph { color: var(--secondary); font-weight: 800; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .pulsing { animation: pulse 1s infinite; }
    </style>
</head>
<body>

<a href="https://wa.me/639091297422" class="float-support" target="_blank">JMCY Support</a>

<div class="user-banner">
    <span>Welcome, <span id="display-name" style="font-weight: bold;">Authenticating...</span></span>
    <button class="btn-logout" onclick="logout()">LOGOUT</button>
</div>

<div class="tab-nav">
    <button class="tab-btn active">Dispatches</button>
    <button class="tab-btn" onclick="window.location.href='profile.html'">My Profile</button>
</div>

<div id="dispatch-tab" class="tab-content active">
    <div class="fixed-mobile-card">
        <h2 class="card-title">
            Live Booking Assignment
            <button class="btn-refresh" onclick="fetchBookings()">Refresh</button>
        </h2>
        <div class="scroll-wrapper">
            <table class="ledger-table">
                <thead>
                    <tr>
                        <th>Action</th><th>ID</th><th>Date</th><th>Time</th><th>Name</th>
                        <th>Preferred Therapist</th><th>People</th><th>Service</th><th>Hrs</th>
                        <th>City</th><th>Address</th><th>Price</th>
                    </tr>
                </thead>
                <tbody id="pendingBody"><tr><td colspan="12">Loading...</td></tr></tbody>
            </table>
        </div>
        <div class="pagination">
            <button class="btn-nav" id="prevBtn" onclick="changePage(-1)">Previous</button>
            <span id="pageInfo" style="font-size: 14px; font-weight: bold;">Page 1</span>
            <button class="btn-nav" id="nextBtn" onclick="changePage(1)">Next</button>
        </div>
    </div>

    <div class="fixed-mobile-card">
        <h2 class="card-title">Accepted Bookings</h2>
        <div class="scroll-wrapper">
            <table class="ledger-table" style="min-width: 800px;">
                <thead>
                    <tr>
                        <th>#</th><th>20% Comm.</th><th>Booking ID</th><th>Date</th><th>Time</th><th>Total Price</th><th>Action</th>
                    </tr>
                </thead>
                <tbody id="acceptedBody"><tr><td colspan="7">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let currentUserProfileName = "";
    let allPendingBookings = [];
    let currentPage = 1;
    const rowsPerPage = 10;
    
    window.supabaseClient = supabase.createClient(
        'https://ovzcjjekmekgxtjcxjbf.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92emNqamVrbWVrZ3h0amN4amJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Njc2MzEsImV4cCI6MjA5NTM0MzYzMX0.7Ym0iTU4FD6vplSTDvw1cF5sEtdJQF6Ie1u8fxegs08',
        { auth: { storage: window.sessionStorage, autoRefreshToken: true, persistSession: true } }
    );

    function formatDate(dateStr) {
        if (!dateStr) return 'N/A';
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });
    }

    function formatTime(timeStr) {
        if (!timeStr) return 'N/A';
        const [hours, minutes] = timeStr.split(':');
        let h = parseInt(hours);
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${h}:${minutes} ${ampm}`;
    }

    function copyText(text) { navigator.clipboard.writeText(text); alert("Copied to clipboard: " + text); }
    async function logout() { await window.supabaseClient.auth.signOut(); window.location.href = "index.html"; }

    async function init() {
        const { data: { session } } = await window.supabaseClient.auth.getSession();
        if (!session) { window.location.href = "login.html"; return; }
        const { data: profile } = await window.supabaseClient.from('therapist_applications').select('full_name').eq('auth_id', session.user.id).single();
        if (profile) {
            currentUserProfileName = profile.full_name;
            document.getElementById('display-name').innerText = profile.full_name;
        }
        fetchBookings();
    }

    async function fetchBookings() {
        const pBody = document.getElementById('pendingBody');
        pBody.classList.add('pulsing');
        
        const { data: bookings } = await window.supabaseClient.from('bookings').select('*');
        allPendingBookings = bookings.filter(b => b.status === 'pending');
        const accepted = bookings.filter(b => b.status === 'accepted' && b.therapist_name === currentUserProfileName);
        
        renderPending();
        
        document.getElementById('acceptedBody').innerHTML = accepted.length ? accepted.map((b, index) => `
            <tr>
                <td>${index + 1}</td>
                <td style="color:var(--accent); font-weight:bold;">₱${(b.total_price * 0.20).toFixed(2)}</td>
                <td>${b.booking_id}</td>
                <td>${formatDate(b.appointment_date)}</td>
                <td>${formatTime(b.appointment_time)}</td>
                <td>₱${b.total_price}</td>
                <td>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn-view" onclick="window.location.href='view.html?id=${b.id}'">VIEW</button>
                        <button class="btn-payment" onclick="window.location.href='payment.html?id=${b.id}'">PAYMENT</button>
                    </div>
                </td>
            </tr>`).join('') : '<tr><td colspan="7">No accepted bookings.</td></tr>';
        
        setTimeout(() => pBody.classList.remove('pulsing'), 500);
    }

    function renderPending() {
        const start = (currentPage - 1) * rowsPerPage;
        const pageData = allPendingBookings.slice(start, start + rowsPerPage);
        
        document.getElementById('pendingBody').innerHTML = pageData.length ? pageData.map(b => `
            <tr>
                <td><button class="btn-accept" onclick="updateBookingStatus('${b.id}')">Accept</button></td>
                <td>${b.booking_id}</td>
                <td class="date-emph">${formatDate(b.appointment_date)}</td>
                <td>${formatTime(b.appointment_time)}</td>
                <td>${b.full_name}</td>
                <td>${b.therapist_gender || 'Any'}</td>
                <td>${b.num_people || '1'}</td>
                <td>${b.services}</td>
                <td>${b.total_duration_hours || '0'}</td>
                <td>${b.city || 'N/A'}</td>
                <td class="copy-hint" ondblclick="copyText('${b.address}')">${b.address || 'N/A'}</td>
                <td>₱${b.total_price}</td>
            </tr>`).join('') : '<tr><td colspan="12">No pending bookings.</td></tr>';

        document.getElementById('pageInfo').innerText = `Page ${currentPage}`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = (currentPage * rowsPerPage) >= allPendingBookings.length;
    }

    function changePage(dir) {
        currentPage += dir;
        renderPending();
    }

    async function updateBookingStatus(id) {
        const { error } = await window.supabaseClient
            .from('bookings')
            .update({ status: 'accepted', therapist_name: currentUserProfileName })
            .eq('id', id);

        if (error) { alert("Failed to accept booking."); return; }
        fetchBookings();
    }

    init();
</script>
</body>
</html>
