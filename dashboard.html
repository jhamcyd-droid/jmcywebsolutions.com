<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JMCY Dispatch & Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a365d; --secondary: #2c5282; --border: #e2e8f0; --light: #f7fafc; --accent: #2f855a; }
        body { font-family: sans-serif; background: #edf2f7; padding: 10px; }
        .fixed-mobile-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .card-title { font-size: 16px; color: var(--primary); margin-bottom: 10px; border-bottom: 2px solid var(--border); padding-bottom: 8px; font-weight: 800; }
        .user-banner { background: var(--primary); color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9rem; text-align: center; }
        .tab-nav { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #cbd5e0; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .scroll-wrapper { width: 100%; overflow-x: auto; }
        .ledger-table { width: 100%; min-width: 1000px; border-collapse: collapse; font-size: 12px; }
        .ledger-table th, .ledger-table td { padding: 10px; border-bottom: 1px solid var(--border); text-align: left; }
        .ledger-table th { background: var(--light); color: var(--primary); text-transform: uppercase; }
        .btn-accept { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="user-banner">Logged in as: <span id="display-name" style="font-weight: bold;">Authenticating...</span></div>

<div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('dispatch', event)">Dispatches</button>
    <button class="tab-btn" onclick="switchTab('profile', event)">My Profile</button>
</div>

<div id="dispatch-tab" class="tab-content active">
    <div class="fixed-mobile-card">
        <h2 class="card-title">Live Booking Assignment</h2>
        <div class="scroll-wrapper">
            <table class="ledger-table">
                <thead><tr><th>Action</th><th>Date</th><th>ID</th><th>Name</th><th>Mobile</th><th>Service</th><th>Duration</th><th>City</th><th>Address</th><th>Price</th></tr></thead>
                <tbody id="pendingBody"><tr><td colspan="10">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
    <div class="fixed-mobile-card">
        <h2 class="card-title">Accepted Bookings</h2>
        <div class="scroll-wrapper">
            <table class="ledger-table">
                <thead><tr><th>Date</th><th>ID</th><th>Name</th><th>Mobile</th><th>Service</th><th>Duration</th><th>City</th><th>Address</th><th>Price</th></tr></thead>
                <tbody id="acceptedBody"><tr><td colspan="9">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<div id="profile-tab" class="tab-content">
    <div class="fixed-mobile-card">
        <h2 class="card-title">Edit Profile Information</h2>
        <input type="text" class="edit-field" id="input-phone" placeholder="Mobile Number" style="margin-bottom:10px; width:100%; padding:10px; border:1px solid var(--border);">
        <input type="text" class="edit-field" id="input-address" placeholder="Address" style="margin-bottom:10px; width:100%; padding:10px; border:1px solid var(--border);">
        <button onclick="saveProfileChanges()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer;">SAVE CHANGES</button>
    </div>
</div>

<script>
    if (!window.supabaseClient) {
        window.supabaseClient = supabase.createClient(
            'https://ovzcjjekmekgxtjcxjbf.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92emNqamVrbWVrZ3h0amN4amJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Njc2MzEsImV4cCI6MjA5NTM0MzYzMX0.7Ym0iTU4FD6vplSTDvw1cF5sEtdJQF6Ie1u8fxegs08'
        );
    }

    async function init() {
        const { data: { user } } = await window.supabaseClient.auth.getUser();
        if (!user) { window.location.href = "login.html"; return; }

        const { data: profile } = await window.supabaseClient
            .from('therapist_applications')
            .select('full_name, phone, address')
            .eq('auth_id', user.id)
            .single();

        if (profile) {
            document.getElementById('display-name').innerText = profile.full_name;
            document.getElementById('input-phone').value = profile.phone || '';
            document.getElementById('input-address').value = profile.address || '';
        }
        fetchBookings();
    }

    async function updateBookingStatus(id) {
        const { data: { user } } = await window.supabaseClient.auth.getUser();
        const { data: profile } = await window.supabaseClient
            .from('therapist_applications')
            .select('full_name')
            .eq('auth_id', user.id)
            .single();

        if (!profile) return alert("Profile not found.");

        const { error } = await window.supabaseClient
            .from('bookings')
            .update({ status: 'accepted', therapist_name: profile.full_name })
            .eq('booking_id', id);

        if (error) alert("Error: " + error.message);
        else {
            alert("Booking accepted!");
            fetchBookings();
        }
    }

    async function fetchBookings() {
        const { data } = await window.supabaseClient.from('bookings').select('*');
        if (!data) return;
        
        const pending = data.filter(b => b.status === 'pending');
        const accepted = data.filter(b => b.status === 'accepted');

        document.getElementById('pendingBody').innerHTML = pending.length ? pending.map(b => `<tr>
            <td><button class="btn-accept" onclick="updateBookingStatus('${b.booking_id}')">Accept</button></td>
            <td>${b.appointment_date}</td><td>${b.booking_id}</td><td>${b.full_name}</td>
            <td>${b.mobile_number}</td><td>${b.services}</td><td>${b.total_duration_hours} hrs</td>
            <td>${b.city}</td><td>${b.address}</td><td>₱${b.total_price}</td>
        </tr>`).join('') : '<tr><td colspan="10">No pending bookings.</td></tr>';

        document.getElementById('acceptedBody').innerHTML = accepted.length ? accepted.map(b => `<tr>
            <td>${b.appointment_date}</td><td>${b.booking_id}</td><td>${b.full_name}</td>
            <td>${b.mobile_number}</td><td>${b.services}</td><td>${b.total_duration_hours} hrs</td>
            <td>${b.city}</td><td>${b.address}</td><td>₱${b.total_price}</td>
        </tr>`).join('') : '<tr><td colspan="9">No accepted bookings.</td></tr>';
    }

    async function saveProfileChanges() {
        const { data: { user } } = await window.supabaseClient.auth.getUser();
        const { error } = await window.supabaseClient
            .from('therapist_applications')
            .update({
                phone: document.getElementById('input-phone').value,
                address: document.getElementById('input-address').value
            })
            .eq('auth_id', user.id);

        if (error) alert("Error: " + error.message);
        else alert("Profile Updated!");
    }

    function switchTab(tab, event) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + '-tab').classList.add('active');
        event.target.classList.add('active');
    }

    init();
    setInterval(fetchBookings, 30000);
</script>
</body>
</html>
