<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Employee Profile Details</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a365d; --secondary: #2c5282; --accent: #2f855a; --dark: #2d3748; --light: #f7fafc; --border: #e2e8f0; }
        * { box-sizing: border-box !important; margin: 0; padding: 0; }
        html, body { font-family: 'Segoe UI', sans-serif; color: var(--dark); background-color: #edf2f7; width: 100%; overflow-x: hidden; }
        nav { background: var(--primary); color: white; padding: 14px 16px; width: 100%; }
        nav .back-btn { float: left; color: white; text-decoration: none; font-size: 14px; font-weight: bold; }
        nav .title-header { text-align: center; font-size: 15px; font-weight: 800; }
        .workspace-wrapper { padding: 12px; margin-bottom: 75px; }
        .fixed-mobile-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
        .card-title { font-size: 14px; font-weight: 800; color: var(--primary); margin-bottom: 14px; border-bottom: 2px solid var(--border); padding-bottom: 8px; text-transform: uppercase; }
        .info-group { margin-bottom: 14px; }
        .info-group .label { font-size: 13px; color: var(--primary); font-weight: 700; margin-bottom: 8px; }
        .value-locked { font-size: 14px; color: #4a5568; font-weight: 600; background: #edf2f7; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border); }
        .info-group input.edit-field { width: 100%; font-size: 14px; padding: 11px 12px; border-radius: 6px; border: 1px solid #cbd5e0; }
        .action-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 12px 16px; border-top: 1px solid var(--border); }
        .save-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <a href="dashboard.html" class="back-btn">⬅ Back</a>
        <div class="title-header">EMPLOYEE FILE</div>
    </nav>

    <div class="workspace-wrapper">
        <section class="fixed-mobile-card">
            <h3 id="prof-fullname" style="font-size:18px; font-weight: 800; color:var(--primary);">Loading...</h3>
        </section>

        <section class="fixed-mobile-card">
            <h2 class="card-title">Personal Information</h2>
            <div class="info-group">
                <div class="label">Mobile Number</div>
                <input type="text" class="edit-field" id="input-phone" placeholder="Enter mobile number">
            </div>
            <div class="info-group">
                <div class="label">Residential Address</div>
                <input type="text" class="edit-field" id="input-address" placeholder="Enter address">
            </div>
        </section>
    </div>

    <div class="action-bar">
        <button type="button" class="save-btn" onclick="saveProfileChanges()">SAVE CHANGES</button>
    </div>

    <script>
        window.supabaseClient = supabase.createClient('https://ovzcjjekmekgxtjcxjbf.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92emNqamVrbWVrZ3h0amN4amJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Njc2MzEsImV4cCI6MjA5NTM0MzYzMX0.7Ym0iTU4FD6vplSTDvw1cF5sEtdJQF6Ie1u8fxegs08');

        async function init() {
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            if (!user) { window.location.href = "login.html"; return; }
            
            const { data: profile } = await window.supabaseClient
                .from('therapist_applications')
                .select('full_name, phone, address')
                .eq('auth_id', user.id)
                .single();

            if (profile) {
                document.getElementById('prof-fullname').innerText = profile.full_name;
                document.getElementById('input-phone').value = profile.phone || '';
                document.getElementById('input-address').value = profile.address || '';
            }
        }

        async function saveProfileChanges() {
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            const { error } = await window.supabaseClient
                .from('therapist_applications')
                .update({
                    phone: document.getElementById('input-phone').value,
                    address: document.getElementById('input-address').value
                })
                .eq('auth_id', user.id);

            if (error) { alert("Error saving: " + error.message); } 
            else { alert("✅ Profile updated successfully!"); }
        }

        init();
    </script>
</body>
</html>
