<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Employee Profile Details</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a365d; --secondary: #2c5282; --accent: #2f855a; --dark: #2d3748; --border: #e2e8f0; }
        * { box-sizing: border-box !important; }
        body { font-family: sans-serif; background-color: #edf2f7; padding-bottom: 80px; }
        .workspace-wrapper { padding: 12px; }
        .fixed-mobile-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
        .card-title { font-size: 14px; font-weight: 800; color: var(--primary); margin-bottom: 14px; border-bottom: 2px solid var(--border); padding-bottom: 8px; text-transform: uppercase; }
        .info-group { margin-bottom: 14px; }
        .label { font-size: 13px; color: var(--primary); font-weight: 700; margin-bottom: 6px; }
        .edit-field { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e0; }
        
        .scroll-wrapper { width: 100%; overflow-x: auto; border: 1px solid var(--border); }
        .ledger-table { width: 100%; min-width: 600px; border-collapse: collapse; font-size: 12px; }
        .ledger-table th, .ledger-table td { padding: 10px; border-bottom: 1px solid var(--border); text-align: left; }
        .ledger-table th { background: #f7fafc; color: var(--primary); position: sticky; top: 0; }
        
        .pagination-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .btn-page { padding: 6px 12px; border: 1px solid var(--border); background: white; cursor: pointer; border-radius: 4px; font-size: 12px; }
        .btn-page:disabled { opacity: 0.5; cursor: not-allowed; }

        .avatar-box { width: 80px; height: 80px; background: #eee; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; border: 2px solid var(--border); }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .modality-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .modality-item { background: #f7fafc; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e0; cursor: pointer; font-size: 12px; }
        .modality-item input:checked + span { color: var(--accent); font-weight: bold; }

        .action-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 12px; border-top: 1px solid var(--border); z-index: 100; }
        .save-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <nav style="background: var(--primary); color: white; padding: 15px; text-align: center;">
        <a href="dashboard.html" style="float:left; color:white; text-decoration:none;">⬅ Back</a>
        <strong>EMPLOYEE FILE</strong>
    </nav>

    <div class="workspace-wrapper">
        <section class="fixed-mobile-card" style="text-align: center;">
            <div class="avatar-box" onclick="document.getElementById('avatar-input').click()">
                <img id="avatar-preview" src="" style="display:none;">
                <span id="avatar-placeholder">Upload</span>
            </div>
            <input type="file" id="avatar-input" hidden accept="image/*" onchange="handleImage(this)">
            <h3 id="prof-fullname">Loading...</h3>
        </section>

        <section class="fixed-mobile-card">
            <h2 class="card-title">Personal Information</h2>
            <div class="info-group"><div class="label">Mobile Number</div><input type="text" class="edit-field" id="input-phone"></div>
            <div class="info-group"><div class="label">Residential Address</div><input type="text" class="edit-field" id="input-address"></div>
            <div class="info-group"><div class="label">Service Locations (e.g. Makati, QC)</div><input type="text" class="edit-field" id="input-zones"></div>
        </section>

        <section class="fixed-mobile-card">
            <h2 class="card-title">Specialties</h2>
            <div class="modality-grid" id="modalities-grid">
                <label class="modality-item"><input type="checkbox" name="modalities" value="Swedish Massage"> <span>Swedish Massage</span></label>
                <label class="modality-item"><input type="checkbox" name="modalities" value="Shiatsu Massage"> <span>Shiatsu Massage</span></label>
                <label class="modality-item"><input type="checkbox" name="modalities" value="Thai Massage"> <span>Thai Massage</span></label>
                <label class="modality-item"><input type="checkbox" name="modalities" value="Reflexology / Foot Massage"> <span>Reflexology / Foot</span></label>
                <label class="modality-item"><input type="checkbox" name="modalities" value="Aromatherapy"> <span>Aromatherapy</span></label>
                <label class="modality-item"><input type="checkbox" name="modalities" value="Deep Tissue Massage"> <span>Deep Tissue Massage</span></label>
                <label class="modality-item"><input type="checkbox" name="modalities" value="Combination Massage"> <span>Combination Massage</span></label>
            </div>
        </section>

        <section class="fixed-mobile-card">
            <h2 class="card-title">Transaction History</h2>
            <div class="scroll-wrapper">
                <table class="ledger-table">
                    <thead><tr><th>#</th><th>Booking ID</th><th>Date</th><th>Comm. Paid</th><th>Status</th></tr></thead>
                    <tbody id="historyBody"><tr><td colspan="5">Loading...</td></tr></tbody>
                </table>
            </div>
            <div class="pagination-bar">
                <button class="btn-page" id="prevBtn" onclick="changePage(-1)">Previous</button>
                <span id="pageIndicator" style="font-size: 12px; font-weight: bold;">Page 1</span>
                <button class="btn-page" id="nextBtn" onclick="changePage(1)">Next</button>
            </div>
        </section>
    </div>

    <div class="action-bar">
        <button class="save-btn" onclick="saveProfileChanges()">SAVE CHANGES</button>
    </div>

    <script>
        window.supabaseClient = supabase.createClient(
            'https://ovzcjjekmekgxtjcxjbf.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92emNqamVrbWVrZ3h0amN4amJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Njc2MzEsImV4cCI6MjA5NTM0MzYzMX0.7Ym0iTU4FD6vplSTDvw1cF5sEtdJQF6Ie1u8fxegs08',
            { auth: { storage: window.sessionStorage, autoRefreshToken: true, persistSession: true } }
        );

        let allHistoryData = [];
        let currentPage = 1;
        const rowsPerPage = 10;
        let profileName = "";

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' }).replace(',', '.');
        }

        async function init() {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (!session) { window.location.href = "login.html"; return; }
            
            const { data: profile } = await window.supabaseClient.from('therapist_applications').select('*').eq('auth_id', session.user.id).single();
            if (profile) {
                profileName = profile.full_name;
                document.getElementById('prof-fullname').innerText = profileName;
                document.getElementById('input-phone').value = profile.phone || '';
                document.getElementById('input-address').value = profile.address || '';
                document.getElementById('input-zones').value = Array.isArray(profile.locations) ? profile.locations.join(', ') : (profile.locations || '');
                
                if (profile.specialties) {
                    let saved = profile.specialties;
                    if (typeof saved === 'string') {
                        try { saved = JSON.parse(saved); } catch (e) { saved = saved.split(',').map(s => s.trim().replace(/['"\[\]]/g, '')); }
                    }
                    if (Array.isArray(saved)) {
                        document.querySelectorAll('input[name="modalities"]').forEach(cb => {
                            if (saved.includes(cb.value)) cb.checked = true;
                        });
                    }
                }
            }
            fetchHistory();
        }

        async function fetchHistory() {
            const { data: bookings } = await window.supabaseClient.from('bookings').select('*');
            const { data: history } = await window.supabaseClient.from('transaction_history').select('*');
            
            allHistoryData = history.filter(h => {
                const b = bookings.find(bk => bk.booking_id === h.booking_id);
                return b && b.therapist_name === profileName;
            }).map(h => ({
                ...h,
                appointment_date: (bookings.find(bk => bk.booking_id === h.booking_id) || {}).appointment_date
            })).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            
            renderTable();
        }

        function renderTable() {
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const paginatedItems = allHistoryData.slice(start, end);
            
            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = paginatedItems.length ? paginatedItems.map((h, index) => `
                <tr>
                    <td>${start + index + 1}</td>
                    <td>${h.booking_id}</td>
                    <td>${formatDate(h.appointment_date || h.created_at)}</td>
                    <td>₱${parseFloat(h.commission_paid || 0).toFixed(2)}</td>
                    <td style="font-weight:600; color:var(--accent);">Paid</td>
                </tr>`).join('') : '<tr><td colspan="5">No records found.</td></tr>';
            
            document.getElementById('pageIndicator').innerText = `Page ${currentPage}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = end >= allHistoryData.length;
        }

        function changePage(dir) {
            currentPage += dir;
            renderTable();
        }

        function handleImage(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('avatar-preview').src = e.target.result;
                document.getElementById('avatar-preview').style.display = 'block';
                document.getElementById('avatar-placeholder').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function saveProfileChanges() {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            const rawLocs = document.getElementById('input-zones').value;
            const updateData = {
                phone: document.getElementById('input-phone').value,
                address: document.getElementById('input-address').value,
                locations: rawLocs ? rawLocs.split(',').map(s => s.trim()) : [],
                specialties: Array.from(document.querySelectorAll('input[name="modalities"]:checked')).map(cb => cb.value)
            };
            const { error } = await window.supabaseClient.from('therapist_applications').update(updateData).eq('auth_id', session.user.id);
            alert(error ? "Error: " + error.message : "✅ Saved!");
        }

        init();
    </script>
</body>
</html>
