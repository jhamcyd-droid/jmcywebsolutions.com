<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Status | JMCY Wellness</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center; max-width: 400px; width: 100%; }
        h1 { color: #2d3748; margin-top: 0; }
        p { color: #4a5568; line-height: 1.6; margin-bottom: 30px; }
        .btn-logout { background: #e53e3e; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="statusTitle">Checking Status...</h1>
        <p id="statusMessage">Please wait while we check your application...</p>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://ovzcjjekmekgxtjcxjbf.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92emNqamVrbWVrZ3h0amC4amJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Njc2MzEsImV4cCI6MjA5NTM0MzYzMX0.7Ym0iTU4FD6vplSTDvw1cF5sEtdJQF6Ie1u8fxegs08'
        );

        async function checkStatus() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = "login.html"; return; }

            const { data: app } = await supabaseClient
                .from('therapist_applications')
                .select('status')
                .eq('auth_id', user.id)
                .single();

            const title = document.getElementById('statusTitle');
            const msg = document.getElementById('statusMessage');

            if (!app || app.status === 'pending') {
                title.innerText = "Account Pending";
                msg.innerHTML = "Your therapist application is currently under review by our admin team. You will be able to access your dashboard once your account has been <strong>approved</strong>.";
            } else if (app.status === 'Approved') {
                window.location.href = "dashboard.html"; // Redirect if already approved
            } else if (app.status === 'Disapproved') {
                title.innerText = "Application Disapproved";
                msg.innerHTML = "We regret to inform you that your application was not approved. For more information, please contact our admin support via WhatsApp: <strong>09091297422</strong>.";
            } else if (app.status === 'Banned') {
                title.innerText = "Account Restricted";
                msg.innerHTML = "Your account has been banned due to a violation of our terms. You cannot apply again to JMCY.";
            }
        }

        async function logout() { 
            await supabaseClient.auth.signOut(); 
            window.location.href = "index.html"; 
        }

        checkStatus();
    </script>
</body>
</html>
