<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Payment - JMCY</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #edf2f7; padding: 20px; color: #2d3748; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; max-width: 500px; margin: 0 auto; }
        h2 { color: #1a365d; margin-top: 0; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; text-align: center; }
        .label { font-weight: 800; color: #4a5568; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 4px; }
        .value { font-size: 1.2rem; color: #2c5282; margin-bottom: 15px; font-weight: bold; }
        .notice { background: #fffaf0; border: 1px solid #fbd38d; color: #744210; padding: 10px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 15px; }
        .btn-submit { width: 100%; padding: 12px; background: #2f855a; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-back { width: 100%; padding: 12px; background: #718096; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        /* Payment Method Selector */
        .method-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .method-btn { flex: 1; padding: 10px; border: 2px solid #cbd5e0; border-radius: 8px; cursor: pointer; font-weight: bold; background: white; text-align: center; font-size: 0.9rem; transition: all 0.2s ease; }
        .method-btn.active-gcash { border-color: #007dfe; background: #e6f2ff; color: #007dfe; }
        .method-btn.active-maya { border-color: #55ba47; background: #eef8ec; color: #55ba47; }
        
        .info-box { background: #f7fafc; padding: 15px; border-radius: 8px; text-align: center; margin: 15px 0; border: 1px dashed #cbd5e0; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #cbd5e0; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Commission Payment</h2>
    <div id="payment-details">Loading...</div>
    
    <div class="label">Select Payment Method</div>
    <div class="method-selector">
        <div id="btn-gcash" class="method-btn active-gcash" onclick="setPaymentMethod('GCash')">GCash</div>
        <div id="btn-maya" class="method-btn" onclick="setPaymentMethod('Maya')">Maya</div>
    </div>

    <div class="info-box">
        <div id="account-label" class="label">Send GCash To:</div>
        <div id="account-number" style="font-size: 1.5rem; font-weight: bold; color: #007dfe;">09310410733</div>
    </div>

    <div id="notice-text" class="notice">
        <strong>⚠️ Required:</strong> Please provide <strong>both</strong> the GCash Reference Number and a screenshot/photo of the transaction to complete your submission.
    </div>

    <div id="ref-label" class="label">GCash Reference Number</div>
    <input type="text" id="ref-number" placeholder="Enter GCash Reference Number">
    
    <div class="label">Upload Receipt Photo</div>
    <input type="file" id="receipt-photo" accept="image/*">
    
    <button class="btn-submit" onclick="submitPayment()">SUBMIT PAYMENT</button>
    <button class="btn-back" onclick="window.location.href='dashboard.html'">BACK TO DASHBOARD</button>
</div>

<script>
    const supabaseClient = supabase.createClient(
        'https://ovzcjjekmekgxtjcxjbf.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92emNqamVrbWVrZ3h0amN4amJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Njc2MzEsImV4cCI6MjA5NTM0MzYzMX0.7Ym0iTU4FD6vplSTDvw1cF5sEtdJQF6Ie1u8fxegs08'
    );

    let commissionAmount = 0;
    let displayBookingId = ""; 
    let currentMethod = "GCash";

    // Configuration for the payment channels
    const paymentConfigs = {
        GCash: {
            sendToLabel: "Send GCash To:",
            number: "09310410733",
            color: "#007dfe",
            refLabel: "GCash Reference Number",
            placeholder: "Enter GCash Reference Number"
        },
        Maya: {
            sendToLabel: "Send Maya To:",
            number: "09091297422",
            color: "#55ba47",
            refLabel: "Maya Reference Number",
            placeholder: "Enter Maya Reference Number"
        }
    };

    function setPaymentMethod(method) {
        currentMethod = method;
        const config = paymentConfigs[method];
        
        const gcashBtn = document.getElementById('btn-gcash');
        const mayaBtn = document.getElementById('btn-maya');
        
        // UI Toggling
        if (method === 'GCash') {
            gcashBtn.className = "method-btn active-gcash";
            mayaBtn.className = "method-btn";
        } else {
            gcashBtn.className = "method-btn";
            mayaBtn.className = "method-btn active-maya";
        }

        // Update Text Context
        document.getElementById('account-label').innerText = config.sendToLabel;
        const numDiv = document.getElementById('account-number');
        numDiv.innerText = config.number;
        numDiv.style.color = config.color;
        
        document.getElementById('notice-text').innerHTML = `<strong>⚠️ Required:</strong> Please provide <strong>both</strong> the ${method} Reference Number and a screenshot/photo of the transaction to complete your submission.`;
        document.getElementById('ref-label').innerText = config.refLabel;
        document.getElementById('ref-number').placeholder = config.placeholder;
    }

    async function loadPayment() {
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('id');
        
        const { data, error } = await supabaseClient
            .from('bookings')
            .select('id, booking_id, total_price')
            .eq('id', bookingId)
            .single();

        if (error || !data) {
            document.getElementById('payment-details').innerHTML = "Error loading booking details.";
            return;
        }

        commissionAmount = (data.total_price * 0.20).toFixed(2);
        displayBookingId = data.booking_id; 
        document.getElementById('payment-details').innerHTML = `
            <div class="label">Booking ID</div><div class="value">${displayBookingId}</div>
            <div class="label">Commission Amount Due</div><div class="value">₱${commissionAmount}</div>
        `;
    }

    async function submitPayment() {
        const ref = document.getElementById('ref-number').value.trim();
        const fileInput = document.getElementById('receipt-photo');

        if (!ref || fileInput.files.length === 0) {
            alert(`Submission Incomplete: Both the ${currentMethod} Reference Number and the Receipt Photo are required.`);
            return;
        }

        const file = fileInput.files[0];
        const fileName = `${Date.now()}_${file.name}`;

        const { error: uploadError } = await supabaseClient.storage
            .from('payment-receipts')
            .upload(fileName, file);

        if (uploadError) { alert("Upload failed: " + uploadError.message); return; }

        const { data: { publicUrl } } = supabaseClient.storage
            .from('payment-receipts')
            .getPublicUrl(fileName);

        const { data: { user } } = await supabaseClient.auth.getUser();
        const { data: profile } = await supabaseClient
            .from('therapist_applications')
            .select('full_name')
            .eq('auth_id', user.id)
            .single();

        const { error: dbError } = await supabaseClient
            .from('payments')
            .insert([{ 
                booking_id: displayBookingId, 
                therapist_auth_id: user.id,
                therapist_name: profile.full_name,
                amount: commissionAmount,
                ref_number: ref,
                photo_url: publicUrl,
                status: 'pending',
                payment_method: currentMethod
            }]);

        if (dbError) { alert("Database error: " + dbError.message); }
        else {
            alert("Payment submitted for verification!");
            window.location.href = 'dashboard.html';
        }
    }

    loadPayment();
</script>
</body>
</html>
