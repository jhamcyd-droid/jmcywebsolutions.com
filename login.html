<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JMCY Wellness Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1e293b; --bg: #f8fafc; --text: #334155; --border: #e2e8f0; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); margin: 0; }
        .page-container { display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 100%; max-width: 420px; background: white; padding: 40px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 24px; }
        .form-control { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; margin-top: 8px; }
        .submit-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="page-container">
    <div class="login-card">
        <h2>Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" class="form-control" required placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="pass" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="submit-btn" id="login-btn">Sign In</button>
        </form>
    </div>
</div>

<script>
    const supabase = window.supabase.createClient(
        'https://ovzcjjekmekgxtjcxjbf.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92emNqamVrbWVrZ3h0amN4amJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Njc2MzEsImV4cCI6MjA5NTM0MzYzMX0.7Ym0iTU4FD6vplSTDvw1cF5sEtdJQF6Ie1u8fxegs08'
    );

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        const usernameInput = document.getElementById('username').value.trim();
        const passwordInput = document.getElementById('pass').value;

        btn.innerText = "Authenticating...";
        btn.disabled = true;

        try {
            const emailAddr = `${usernameInput}@jmcywellness.com`;
            const { data: authData, error: authError } = await supabase.auth.signInWithPassword({ 
                email: emailAddr, 
                password: passwordInput 
            });
            
            if (authError) throw authError;

            console.log("Logged in user ID:", authData.user.id);

            // Fetch status
            const { data: profile, error: dbError } = await supabase
                .from('therapist_applications')
                .select('status')
                .eq('auth_id', authData.user.id)
                .single();

            if (dbError) {
                console.error("Database Error:", dbError);
                throw new Error("Could not find your profile record. Ensure your account is linked to the 'therapist_applications' table.");
            }

            const status = profile?.status ? profile.status.toString().trim().toLowerCase() : "";
            console.log("Database status:", status);

            if (status === "accepted" || status === "approved") {
                window.location.href = "dashboard.html";
            } else {
                window.location.href = "pending.html";
            }

        } catch (err) {
            alert("Login Error: " + err.message);
            btn.innerText = "Sign In";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
