<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JMCY Wellness Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a365d; --secondary: #2c5282; --accent: #2f855a; --dark: #1a202c; --light: #f7fafc; --border: #e2e8f0; --text-muted: #718096; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; background: radial-gradient(circle at top right, #f0f4f8, var(--light)); }
        header { padding: 20px; background: white; border-bottom: 1px solid var(--border); text-align: center; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .page-container { display: flex; flex: 1; width: 100%; }
        .image-side { flex: 1; background: linear-gradient(rgba(26, 54, 93, 0.85), rgba(26, 54, 93, 0.85)), url('https://images.unsplash.com/photo-1540555700478-4be289fbecef?auto=format&fit=crop&w=1200&q=80'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; padding: 60px; color: #ffffff; }
        .form-side { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { max-width: 400px; width: 100%; background: #ffffff; border-radius: 12px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; }
        .submit-btn { background-color: var(--primary); color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .input-icon-wrapper { position: relative; }
        .toggle-password-btn { position: absolute; right: 10px; top: 12px; border: none; background: none; cursor: pointer; color: var(--text-muted); font-size: 0.8rem; font-weight: bold; z-index: 10; }
        @media (max-width: 768px) {
            .page-container { flex-direction: column; }
            .image-side { display: none; }
            .form-side { padding: 40px 20px; }
            .login-container { box-shadow: none; border: none; background: transparent; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">JMCY WELLNESS</a>
    </header>

    <div class="page-container">
        <section class="image-side">
            <h2>Welcome Back to Your Network Dashboard.</h2>
            <p>Log in using your unique credentials to manage your workspace.</p>
        </section>

        <main class="form-side">
            <div class="login-container">
                <h2>Therapist Portal</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" class="form-control" required placeholder="Enter username">
                    </div>
                    <div class="form-group">
                        <label for="pass">Password</label>
                        <div class="input-icon-wrapper">
                            <input type="password" id="pass" class="form-control" required placeholder="••••••••">
                            <button type="button" class="toggle-password-btn" id="toggleBtn">Show</button>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn" id="login-btn">Log In</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const supabase = window.supabase.createClient(
                'https://ovzcjjekmekgxtjcxjbf.supabase.co', 
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92emNqamVrbWVrZ3h0amN4amJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Njc2MzEsImV4cCI6MjA5NTM0MzYzMX0.7Ym0iTU4FD6vplSTDvw1cF5sEtdJQF6Ie1u8fxegs08'
            );

            const toggleBtn = document.getElementById('toggleBtn');
            const passInput = document.getElementById('pass');

            toggleBtn.addEventListener('click', () => {
                const isPassword = passInput.type === "password";
                passInput.type = isPassword ? "text" : "password";
                toggleBtn.innerText = isPassword ? "Hide" : "Show";
            });

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('login-btn');
                const usernameInput = document.getElementById('username').value.trim();
                const passwordInput = document.getElementById('pass').value;

                if (usernameInput === "jmcywellness" && passwordInput === "jmcy1234") {
                    window.location.href = "admin.html";
                    return;
                }

                btn.innerText = "Authenticating...";
                btn.disabled = true;

                try {
                    const emailAddr = `${usernameInput}@jmcywellness.com`;
                    
                    // 1. Authenticate
                    const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                        email: emailAddr,
                        password: passwordInput
                    });

                    if (authError) throw authError;

                    // 2. Fetch therapist name from database
                    const { data: profile, error: profileError } = await supabase
                        .from('therapist_applications')
                        .select('full_name')
                        .eq('email', emailAddr)
                        .single();

                    if (profile) {
                        localStorage.setItem("jmcy_name", profile.full_name);
                        localStorage.setItem("jmcy_email", emailAddr);
                    }

                    window.location.href = "dashboard.html";
                } catch (err) {
                    console.error("Auth Error:", err);
                    alert("Invalid username or password.");
                    btn.innerText = "Log In";
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
