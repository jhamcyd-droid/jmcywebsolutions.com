<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JMCY Wellness Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #1e293b; --accent: #0f172a; --brand: #3b82f6; 
            --bg: #f8fafc; --text: #334155; --border: #e2e8f0; 
        }
        body { font-family: 'Inter', -apple-system, sans-serif; margin: 0; background-color: var(--bg); color: var(--text); }
        
        header { padding: 20px 40px; background: white; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .brand-wrapper { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 40px; width: 40px; border-radius: 50%; object-fit: cover; }
        .logo { font-size: 1.25rem; font-weight: 700; color: var(--primary); text-decoration: none; letter-spacing: -0.5px; }
        
        .back-btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px; color: var(--primary); text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: 0.2s; }
        .back-btn:hover { background: var(--bg); }
        
        .page-container { display: flex; min-height: calc(100vh - 81px); }
        .image-side { flex: 1; background: linear-gradient(135deg, #1e293b, #0f172a); padding: 80px; display: flex; flex-direction: column; justify-content: center; color: white; }
        .image-side h2 { font-size: 2.5rem; margin-bottom: 1rem; line-height: 1.2; }
        
        .form-side { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 100%; max-width: 420px; background: white; padding: 40px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: var(--primary); }
        .form-control { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; box-sizing: border-box; font-size: 1rem; transition: 0.2s; }
        .form-control:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        .submit-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .submit-btn:hover { opacity: 0.9; }
        .submit-btn:disabled { background: #94a3b8; }
        
        .toggle-password-btn { position: absolute; right: 16px; top: 40px; border: none; background: none; cursor: pointer; color: #64748b; font-size: 0.75rem; font-weight: 600; }

        @media (max-width: 768px) {
            .image-side { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand-wrapper">
        <img src="logo.png" alt="JMCY Logo" class="logo-img">
        <a href="index.html" class="logo">JMCY WELLNESS</a>
    </div>
    <a href="index.html" class="back-btn">← Back</a>
</header>

<div class="page-container">
    <section class="image-side">
        <h2 style="font-weight: 800;">Professional<br>Management Portal</h2>
        <p style="opacity: 0.8; font-size: 1.1rem; max-width: 350px;">Secure access for authorized therapists and administrators.</p>
    </section>

    <main class="form-side">
        <div class="login-card">
            <h2 style="margin-top:0;">Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" required placeholder="Enter your username">
                </div>
                <div class="form-group" style="position: relative;">
                    <label for="pass">Password</label>
                    <input type="password" id="pass" class="form-control" required placeholder="••••••••">
                    <button type="button" class="toggle-password-btn" id="toggleBtn">SHOW</button>
                </div>
                <button type="submit" class="submit-btn" id="login-btn">Sign In</button>
            </form>
        </div>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const supabase = window.supabase.createClient(
            'https://ovzcjjekmekgxtjcxjbf.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92emNqamVrbWVrZ3h0amN4amJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Njc2MzEsImV4cCI6MjA5NTM0MzYzMX0.7Ym0iTU4FD6vplSTDvw1cF5sEtdJQF6Ie1u8fxegs08',
            { auth: { storage: window.sessionStorage, autoRefreshToken: true, persistSession: true } }
        );

        const toggleBtn = document.getElementById('toggleBtn');
        const passInput = document.getElementById('pass');
        toggleBtn.addEventListener('click', () => {
            const isPassword = passInput.type === "password";
            passInput.type = isPassword ? "text" : "password";
            toggleBtn.innerText = isPassword ? "HIDE" : "SHOW";
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('pass').value;

            if (usernameInput === "jmcywellness" && passwordInput === "jmcy1234") {
                window.location.href = "admin.html";
                return;
            }

            btn.innerText = "Authenticating...";
            btn.disabled = true;

            try {
                const emailAddr = `${usernameInput}@jmcywellness.com`;
                const { error } = await supabase.auth.signInWithPassword({ email: emailAddr, password: passwordInput });
                if (error) throw error;

                const { data: profile } = await supabase.from('therapist_applications').select('full_name').eq('email', emailAddr).single();
                if (profile) {
                    sessionStorage.setItem("jmcy_name", profile.full_name);
                    sessionStorage.setItem("jmcy_email", emailAddr);
                }
                window.location.href = "dashboard.html";
            } catch (err) {
                alert("Authentication failed. Please check your credentials.");
                btn.innerText = "Sign In";
                btn.disabled = false;
            }
        });
    });
</script>
</body>
</html>
