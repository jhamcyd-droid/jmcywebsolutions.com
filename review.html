<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Review</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #edf2f7; padding: 20px; color: #2d3748; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; max-width: 500px; margin: 0 auto; }
        h2 { color: #1a365d; margin-top: 0; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
        .detail-group { margin-bottom: 15px; }
        .label { font-weight: 800; color: #4a5568; display: block; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 4px; }
        .value { font-size: 1rem; color: #1a365d; }
        .btn-back { width: 100%; padding: 12px; background: #1a365d; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Booking Information</h2>
    <div id="booking-details">Loading details...</div>
    <button class="btn-back" onclick="window.location.href='dashboard.html'">BACK TO DASHBOARD</button>
</div>

<script>
    const supabaseClient = supabase.createClient(
        'https://ovzcjjekmekgxtjcxjbf.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92emNqamVrbWVrZ3h0amN4amJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Njc2MzEsImV4cCI6MjA5NTM0MzYzMX0.7Ym0iTU4FD6vplSTDvw1cF5sEtdJQF6Ie1u8fxegs08'
    );

    async function fetchBookingDetails() {
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('id');
        const container = document.getElementById('booking-details');

        console.log("Looking for ID:", bookingId); // Check this in your browser console (F12)

        if (!bookingId) {
            container.innerHTML = "No booking selected.";
            return;
        }

        // IMPORTANT: Change 'booking_id' below if your column is named differently in Supabase
        const { data, error } = await supabaseClient
            .from('bookings')
            .select('*')
            .eq('booking_id', bookingId) 
            .single();

        if (error) {
            console.error("Supabase Error:", error);
            container.innerHTML = "Error: " + error.message;
            return;
        }

        container.innerHTML = Object.entries(data).map(([key, value]) => `
            <div class="detail-group">
                <span class="label">${key.replace('_', ' ')}</span>
                <div class="value">${value !== null ? value : 'N/A'}</div>
            </div>
        `).join('');
    }

    fetchBookingDetails();
</script>
</body>
</html>
