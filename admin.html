<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrative HQ | JMCY Wellness Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a365d; --accent: #2f855a; --border: #e2e8f0; --light: #f7fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #edf2f7; margin: 0; padding: 20px; }
        .admin-container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .table-responsive { overflow-x: auto; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .admin-table th { background: var(--light); padding: 12px; text-align: left; border-bottom: 2px solid var(--border); text-transform: uppercase; }
        .admin-table td { padding: 12px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="admin-container">
        <main class="card">
            <h2>Recent Bookings</h2>
            <div class="table-responsive">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Mobile</th>
                            <th>Services</th>
                            <th>Duration</th>
                            <th>City</th>
                            <th>Address</th>
                            <th>Total Price</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTableBody">
                        <tr><td colspan="8" style="text-align:center;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const supabase = window.supabase.createClient('https://ovzcjjekmekgxtjcxjbf.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92emNqamVrbWVrZ3h0amN4amJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Njc2MzEsImV4cCI6MjA5NTM0MzYzMX0.7Ym0iTU4FD6vplSTDvw1cF5sEtdJQF6Ie1u8fxegs08');

        async function fetchBookings() {
            const tableBody = document.getElementById('bookingsTableBody');
            
            const { data, error } = await supabase
                .from('bookings')
                .select('appointment_date, full_name, mobile_number, services, total_duration_hours, city, address, total_price')
                .order('created_at', { ascending: false });

            if (error) {
                tableBody.innerHTML = `<tr><td colspan="8" style="color:red; text-align:center;">Error: ${error.message}</td></tr>`;
                return;
            }

            if (!data || data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center;">No bookings found.</td></tr>`;
                return;
            }

            tableBody.innerHTML = data.map(b => `
                <tr>
                    <td>${b.appointment_date}</td>
                    <td style="font-weight:bold;">${b.full_name}</td>
                    <td>${b.mobile_number}</td>
                    <td>${b.services}</td>
                    <td>${b.total_duration_hours} hrs</td>
                    <td>${b.city}</td>
                    <td>${b.address}</td>
                    <td style="color:var(--accent); font-weight:bold;">₱${parseFloat(b.total_price || 0).toLocaleString()}</td>
                </tr>
            `).join('');
        }

        // Fetch immediately on load
        fetchBookings();

        // Auto-refresh every 60 seconds
        setInterval(fetchBookings, 60000);
    </script>
</body>
</html>
