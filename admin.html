<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrative HQ | JMCY Wellness Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a365d; --accent: #2f855a; --border: #e2e8f0; --light: #f7fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #edf2f7; margin: 0; padding: 20px; }
        .admin-container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .table-responsive { overflow-x: auto; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .admin-table th { background: var(--light); padding: 12px; text-align: left; border-bottom: 2px solid var(--border); text-transform: uppercase; }
        .admin-table td { padding: 12px; border-bottom: 1px solid var(--border); }
        .assigned-name { color: var(--accent); font-weight: bold; }
        .btn-paid { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-container">
    <main class="card">
        <div class="header-section"><h2>Pending Bookings</h2></div>
        <div class="table-responsive">
            <table class="admin-table">
                <thead><tr><th>Date</th><th>Name</th><th>Mobile</th><th>Services</th><th>Total Price</th></tr></thead>
                <tbody id="pendingBody"><tr><td colspan="5">Loading data...</td></tr></tbody>
            </table>
        </div>
    </main>

    <main class="card">
        <div class="header-section"><h2>Accepted Bookings & Assigned Therapists</h2></div>
        <div class="table-responsive">
            <table class="admin-table">
                <thead><tr><th>Date</th><th>Name</th><th>Services</th><th>Assigned Therapist</th><th>Total Price</th><th>Comm. (15%)</th><th>Action</th></tr></thead>
                <tbody id="acceptedBody"><tr><td colspan="7">Loading data...</td></tr></tbody>
            </table>
        </div>
    </main>
</div>

<script>
    if (!window.mySupabaseClient) {
        window.mySupabaseClient = window.supabase.createClient(
            'https://ovzcjjekmekgxtjcxjbf.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92emNqamVrbWVrZ3h0amN4amJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Njc2MzEsImV4cCI6MjA5NTM0MzYzMX0.7Ym0iTU4FD6vplSTDvw1cF5sEtdJQF6Ie1u8fxegs08'
        );
    }

    async function markAsPaid(bookingId) {
        const { error } = await window.mySupabaseClient
            .from('bookings')
            .update({ status: 'paid' })
            .eq('booking_id', bookingId);

        if (error) { alert("Error updating status: " + error.message); }
        else { alert("Commission marked as paid!"); fetchBookings(); }
    }

    async function fetchBookings() {
        const { data, error } = await window.mySupabaseClient
            .from('bookings')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) { console.error("Fetch error:", error); return; }

        const pending = data.filter(b => b.status === 'pending');
        const accepted = data.filter(b => b.status === 'accepted');

        // Render Pending
        document.getElementById('pendingBody').innerHTML = pending.length > 0 ? pending.map(b => `
            <tr>
                <td>${b.appointment_date || '-'}</td>
                <td>${b.full_name || '-'}</td>
                <td>${b.mobile_number || '-'}</td>
                <td>${b.services || '-'}</td>
                <td>₱${parseFloat(b.total_price || 0).toLocaleString()}</td>
            </tr>`).join('') : '<tr><td colspan="5">No pending bookings.</td></tr>';

        // Render Accepted
        document.getElementById('acceptedBody').innerHTML = accepted.length > 0 ? accepted.map(b => {
            const commission = (b.total_price * 0.15).toFixed(2);
            return `
            <tr>
                <td>${b.appointment_date || '-'}</td>
                <td>${b.full_name || '-'}</td>
                <td>${b.services || '-'}</td>
                <td class="assigned-name">${b.therapist_name || 'Unassigned'}</td>
                <td>₱${parseFloat(b.total_price || 0).toLocaleString()}</td>
                <td style="font-weight:bold;">₱${commission}</td>
                <td><button class="btn-paid" onclick="markAsPaid('${b.booking_id}')">Mark Paid</button></td>
            </tr>`;
        }).join('') : '<tr><td colspan="7">No accepted bookings yet.</td></tr>';
    }

    fetchBookings();
    setInterval(fetchBookings, 30000);
</script>
</body>
</html>
