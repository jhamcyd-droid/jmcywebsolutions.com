<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrative HQ | JMCY Wellness Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a365d; --accent: #2f855a; --border: #e2e8f0; --light: #f7fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #edf2f7; margin: 0; padding: 20px; }
        .admin-container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .table-responsive { overflow-x: auto; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .admin-table th { background: var(--light); padding: 12px; text-align: left; border-bottom: 2px solid var(--border); text-transform: uppercase; }
        .admin-table td { padding: 12px; border-bottom: 1px solid var(--border); }
        .assigned-name { color: var(--accent); font-weight: bold; }
        .btn-paid { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-container">
    <main class="card">
        <div class="header-section"><h2>Pending Bookings</h2></div>
        <div class="table-responsive">
            <table class="admin-table">
                <thead><tr><th>Date</th><th>Name</th><th>Mobile</th><th>Services</th><th>Total Price</th></tr></thead>
                <tbody id="pendingBody"><tr><td colspan="5">Loading...</td></tr></tbody>
            </table>
        </div>
    </main>

    <main class="card">
        <div class="header-section"><h2>Accepted Bookings & Assigned Therapists</h2></div>
        <div class="table-responsive">
            <table class="admin-table">
                <thead><tr><th>Date</th><th>Name</th><th>Services</th><th>Assigned Therapist</th><th>Total Price</th><th>Comm. (15%)</th><th>Action</th></tr></thead>
                <tbody id="acceptedBody"><tr><td colspan="7">Loading...</td></tr></tbody>
            </table>
        </div>
    </main>

    <main class="card">
        <div class="header-section"><h2>Transaction History</h2></div>
        <div class="table-responsive">
            <table class="admin-table">
                <thead><tr><th>Booking ID</th><th>Service</th><th>Commission Paid</th><th>Date</th></tr></thead>
                <tbody id="historyBody"><tr><td colspan="4">Loading...</td></tr></tbody>
            </table>
        </div>
    </main>
</div>

<script>
    const supabaseClient = supabase.createClient(
        'https://ovzcjjekmekgxtjcxjbf.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92emNqamVrbWVrZ3h0amN4amJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Njc2MzEsImV4cCI6MjA5NTM0MzYzMX0.7Ym0iTU4FD6vplSTDvw1cF5sEtdJQF6Ie1u8fxegs08'
    );

    async function markAsPaid(booking) {
        // 1. Insert into history
        const { error: insertError } = await supabaseClient.from('transaction_history').insert([{
            booking_id: booking.booking_id,
            service: booking.services,
            commission_paid: (booking.total_price * 0.15).toFixed(2)
        }]);

        if (insertError) { alert("Error recording history: " + insertError.message); return; }

        // 2. Update booking status using the Primary Key 'id'
        const { error: updateError } = await supabaseClient
            .from('bookings')
            .update({ status: 'completed' })
            .eq('id', booking.id); 
        
        if (updateError) { alert("Error updating status: " + updateError.message); return; }
        
        alert("Commission marked as paid and moved to history!");
        fetchBookings();
    }

    async function fetchBookings() {
        const { data: bookings } = await supabaseClient.from('bookings').select('*').order('created_at', { ascending: false });
        const { data: history } = await supabaseClient.from('transaction_history').select('*').order('created_at', { ascending: false });

        const pending = bookings.filter(b => b.status === 'pending');
        const accepted = bookings.filter(b => b.status === 'accepted');

        document.getElementById('pendingBody').innerHTML = pending.length ? pending.map(b => `
            <tr><td>${b.appointment_date || '-'}</td><td>${b.full_name || '-'}</td><td>${b.mobile_number || '-'}</td><td>${b.services || '-'}</td><td>₱${parseFloat(b.total_price || 0).toLocaleString()}</td></tr>
        `).join('') : '<tr><td colspan="5">No pending bookings.</td></tr>';

        // We use encodeURIComponent to safely pass the object to the function
        document.getElementById('acceptedBody').innerHTML = accepted.length ? accepted.map(b => `
            <tr>
                <td>${b.appointment_date || '-'}</td>
                <td>${b.full_name || '-'}</td>
                <td>${b.services || '-'}</td>
                <td class="assigned-name">${b.therapist_name || 'Unassigned'}</td>
                <td>₱${parseFloat(b.total_price || 0).toLocaleString()}</td>
                <td>₱${(b.total_price * 0.15).toFixed(2)}</td>
                <td><button class="btn-paid" onclick='markAsPaid(${JSON.stringify(b).replace(/'/g, "&apos;")})'>Mark Paid</button></td>
            </tr>
        `).join('') : '<tr><td colspan="7">No accepted bookings.</td></tr>';

        document.getElementById('historyBody').innerHTML = history && history.length ? history.map(h => `
            <tr><td>${h.booking_id}</td><td>${h.service}</td><td>₱${h.commission_paid}</td><td>${new Date(h.created_at).toLocaleDateString()}</td></tr>
        `).join('') : '<tr><td colspan="4">No history records yet.</td></tr>';
    }

    fetchBookings();
    setInterval(fetchBookings, 30000);
</script>
</body>
</html>
