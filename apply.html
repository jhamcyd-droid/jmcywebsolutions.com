<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Therapist Application | JMCY Wellness Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a365d; --accent: #2f855a; --bg: #f7fafc; --border: #e2e8f0; --danger: #e53e3e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 40px 20px; color: var(--primary); }
        .form-container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        h2 { margin-bottom: 25px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 5px; color: #4a5568; }
        input[type="text"], input[type="password"], input[type="tel"], input[type="file"], select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .checkbox-item { display: flex; align-items: center; font-size: 0.9rem; color: #4a5568; cursor: pointer; }
        .checkbox-item input { width: auto; margin-right: 10px; }

        .file-row { display: flex; gap: 10px; align-items: center; }
        .remove-btn { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .submit-btn { background: var(--accent); color: white; width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .note { font-size: 0.75rem; color: #718096; margin-top: 4px; display: block; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Therapist Hiring Application</h2>
    <form id="hireForm">
        <div class="form-group"><label>Username</label><input type="text" id="username" required></div>
        
        <div class="form-group">
            <label>Password</label>
            <div style="position: relative; display: flex; align-items: center;">
                <input type="password" id="password" required minlength="8" style="padding-right: 60px;">
                <button type="button" id="togglePass" style="position: absolute; right: 10px; background: none; border: none; cursor: pointer; font-size: 0.75rem; font-weight: bold; color: #2f855a;">Show</button>
            </div>
        </div>

        <div class="form-group"><label>Full Legal Name</label><input type="text" id="fullName" required></div>
        <div class="form-group"><label>Address</label><input type="text" id="address" required></div>
        
        <div class="form-group">
            <label>Preferred Service Locations (Select 1-3)</label>
            <div class="checkbox-group" id="locations-group">
                <label class="checkbox-item"><input type="checkbox" name="location" value="Quezon City"> Quezon City</label>
                <label class="checkbox-item"><input type="checkbox" name="location" value="Manila"> City of Manila</label>
                <label class="checkbox-item"><input type="checkbox" name="location" value="San Juan"> San Juan City</label>
                <label class="checkbox-item"><input type="checkbox" name="location" value="Mandaluyong"> Mandaluyong City</label>
                <label class="checkbox-item"><input type="checkbox" name="location" value="Pasig"> Pasig City</label>
                <label class="checkbox-item"><input type="checkbox" name="location" value="Makati"> Makati City</label>
                <label class="checkbox-item"><input type="checkbox" name="location" value="Taguig"> Taguig City</label>
                <label class="checkbox-item"><input type="checkbox" name="location" value="Parañaque"> Parañaque City</label>
                <label class="checkbox-item"><input type="checkbox" name="location" value="Las Piñas"> Las Piñas City</label>
                <label class="checkbox-item"><input type="checkbox" name="location" value="Muntinlupa"> Muntinlupa City</label>
            </div>
        </div>

        <div class="form-group"><label>Massage Specialties</label><input type="text" id="specialties" required></div>
        <div class="form-group">
            <label>Contact Number</label>
            <input type="tel" id="phone" placeholder="09XXXXXXXXX" pattern="^(09)\d{9}$" required>
            <span class="note">*Must be your active GCash and WhatsApp number.</span>
        </div>

        <div class="form-group">
            <label>Government ID</label>
            <div class="file-row">
                <input type="file" id="govId" accept="image/*" required>
                <button type="button" class="remove-btn" onclick="clearFile('govId')">Clear</button>
            </div>
        </div>
        <div class="form-group">
            <label>Selfie with Gov. ID</label>
            <div class="file-row">
                <input type="file" id="selfieId" accept="image/*" required>
                <button type="button" class="remove-btn" onclick="clearFile('selfieId')">Clear</button>
            </div>
        </div>
        <div class="form-group">
            <label>Massage Certificate</label>
            <div class="file-row">
                <input type="file" id="cert" accept="image/*,.pdf" required>
                <button type="button" class="remove-btn" onclick="clearFile('cert')">Clear</button>
            </div>
        </div>

        <button type="submit" class="submit-btn" id="btn-submit">Submit Application</button>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const supabase = supabase.createClient('YOUR_URL', 'YOUR_KEY');
        
        // 1. Password Toggle
        const togglePass = document.getElementById('togglePass');
        const passwordInput = document.getElementById('password');
        togglePass.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePass.innerText = type === 'password' ? 'Show' : 'Hide';
        });

        // 2. Corrected Clear File Function
        window.clearFile = function(id) {
            const oldInput = document.getElementById(id);
            const newInput = document.createElement("input");
            
            newInput.type = "file";
            newInput.id = oldInput.id;
            newInput.name = oldInput.name;
            newInput.accept = oldInput.accept;
            newInput.required = oldInput.required;
            
            oldInput.parentNode.replaceChild(newInput, oldInput);
        };

        // 3. Password Hashing
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // 4. File Upload
        async function uploadFile(file, folder) {
            const filePath = `${folder}/${Date.now()}_${file.name}`;
            const { error } = await supabase.storage.from('therapist-docs').upload(filePath, file);
            if (error) throw error;
            return supabase.storage.from('therapist-docs').getPublicUrl(filePath).data.publicUrl;
        }

        // 5. Form Submission
        document.getElementById('hireForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const checkedBoxes = document.querySelectorAll('input[name="location"]:checked');
            const selectedLocations = Array.from(checkedBoxes).map(cb => cb.value);
            
            if (selectedLocations.length === 0 || selectedLocations.length > 3) {
                alert("Please select between 1 and 3 locations.");
                return;
            }

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerText = "Submitting...";

            try {
                const govUrl = await uploadFile(document.getElementById('govId').files[0], 'gov_ids');
                const selfieUrl = await uploadFile(document.getElementById('selfieId').files[0], 'selfies');
                const certUrl = await uploadFile(document.getElementById('cert').files[0], 'certs');
                const hashed = await hashPassword(document.getElementById('password').value);

                await supabase.from('therapist_applicants').insert([{
                    username: document.getElementById('username').value,
                    password_hash: hashed,
                    full_name: document.getElementById('fullName').value,
                    address: document.getElementById('address').value,
                    preferred_locations: selectedLocations.join(', '),
                    specialties: document.getElementById('specialties').value,
                    phone: document.getElementById('phone').value,
                    gov_id_url: govUrl,
                    selfie_id_url: selfieUrl,
                    cert_url: certUrl
                }]);

                alert("Application successful!");
                window.location.reload();
            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "Submit Application";
            }
        };
    });
</script>
</body>
</html>
